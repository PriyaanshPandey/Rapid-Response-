<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="config.js"></script>
  <title>Staff‑1 — RAPID RESPONSE Rescue POV</title>
  <style>
    :root {
      --danger: #ff4d4d; --success: #22c55e; --warning: #f59e0b; --info: #38bdf8;
      --bg-primary: #0d0d0d; --bg-card: #161616; --border: #2a2a2a;
      --text-white: #ffffff; --text-gray: #9ca3af; --text-muted: #6b7280;
      --radius: 8px; --padding: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary); color: var(--text-white);
      font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh;
      display: flex; flex-direction: column;
    }
    header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
    .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; background: rgba(255,77,77,0.1); color: var(--danger); border: 1px solid rgba(255,77,77,0.3); }
    .main { flex: 1; display: flex; overflow: hidden; }
    .map-area { width: 65%; position: relative; background: #000; border-right: 1px solid var(--border); }
    .side-panel { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; }
    .card-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
    .assignment-text { font-size: 16px; font-weight: 700; }
    .btn-action { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; font-weight: 700; cursor: pointer; margin-bottom: 8px; transition: all 0.2s; }
    .btn-action:hover { background: rgba(255,255,255,0.1); border-color: var(--info); }
    .target-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .map-floor { width: 100%; height: 100%; object-fit: contain; opacity: 0.8; }
    .dot { position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%,-50%); z-index: 20; }
    .dot-target { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
    .dot-me { background: #fff; border: 2px solid var(--info); box-shadow: 0 0 10px var(--info); }
  </style>
</head>
<body>
  <header>
    <div style="display:flex; align-items:center; gap:12px">
      <div class="badge">RESCUE ACTIVE</div>
      <div>
        <div style="font-weight:800; font-size:16px;">RAPID RESPONSE</div>
        <div style="font-size:11px; color:var(--text-muted)">Staff‑1 (Rescue POV)</div>
      </div>
    </div>
    <a href="dashboard.html" style="color:var(--text-gray); text-decoration:none; font-size:12px; font-weight:600">← Exit POV</a>
  </header>

  <div class="main">
    <div class="map-area" id="map-container">
      <img src="floor-map.png" class="map-floor" />
      <div id="dots-layer" style="position:absolute; inset:0"></div>
    </div>
    <div class="side-panel">
      <div class="card" style="border-left: 4px solid var(--danger)">
        <div class="card-title">Priority Assignment</div>
        <div id="current-task" class="assignment-text">Searching for active help requests...</div>
      </div>

      <div class="card">
        <div class="card-title">Guests Awaiting Rescue</div>
        <div id="target-list">
          <div style="color:var(--text-muted); font-size:12px;">No active targets found.</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Field Actions</div>
        <button class="btn-action" onclick="updateLocation()">📍 Log My Current Node</button>
        <button class="btn-action" style="color:var(--success); border-color:var(--success)" onclick="completeRescue()">✅ Mark Target as Rescued</button>
        <button class="btn-action" style="color:var(--danger); border-color:var(--danger)" onclick="alert('Backup requested.')">🚨 Request Backup</button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = window.CONFIG || { NODE_API: 'http://localhost:5000' };
    const API_BASE = CONFIG.NODE_API;
    const MY_NAME = "Staff-1";

    let allUsers = [];
    let myUser = null;

    async function fetchData() {
      try {
        const res = await fetch(`${API_BASE}/api/users`);
        allUsers = await res.json();
        myUser = allUsers.find(u => u.name === MY_NAME);
        render();
      } catch (e) { console.error(e); }
    }

    function render() {
      const targets = allUsers.filter(u => u.type === 'guest' && u.status === 'help');
      
      // Update Task
      const taskDiv = document.getElementById('current-task');
      if (targets.length) {
        taskDiv.innerText = `Rescue ${targets[0].name} @ Room ${targets[0].node || '??'}`;
      } else {
        taskDiv.innerText = "All Clear — Wait for Dispatch";
      }

      // Update List
      const listDiv = document.getElementById('target-list');
      if (targets.length) {
        listDiv.innerHTML = targets.map(t => `
          <div class="target-item">
            <span>${t.name}</span>
            <span style="color:var(--warning); font-weight:800">${t.node || '??'}</span>
          </div>
        `).join('');
      } else {
        listDiv.innerHTML = '<div style="color:var(--text-muted); font-size:12px;">Scanning floor...</div>';
      }
    }

    async function updateLocation() {
      const node = prompt("Enter current Node ID:", myUser ? myUser.node : "");
      if (!node || !myUser) return;
      await fetch(`${API_BASE}/api/users/${myUser._id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ node, status: 'moving' })
      });
      fetchData();
    }

    async function completeRescue() {
      const target = allUsers.find(u => u.type === 'guest' && u.status === 'help');
      if (!target) return alert("No target selected.");
      await fetch(`${API_BASE}/api/users/${target._id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'safe' })
      });
      fetchData();
    }

    setInterval(fetchData, 4000);
    fetchData();
  </script>
</body>
</html>
